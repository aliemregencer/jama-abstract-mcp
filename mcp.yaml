name: jama-abstract-mcp
version: "1.0.2"
description: "JAMA tıp dergisi makalelerinden veri çıkarma MCP servisi (optimize edilmiş)"

server:
  command: python
  args: ["main.py", "--transport", "http", "--host", "0.0.0.0", "--port", "8000"]
  env:
    PYTHONPATH: "."
    PYTHONUNBUFFERED: "1"
    MCP_TRANSPORT: "http"
    MCP_HOST: "0.0.0.0"
    MCP_PORT: "8000"

# Tools tanımları
tools:
  - name: extract_jama_article
    description: "JAMA makale linkinden makale verilerini çıkarır"
    inputSchema:
      type: object
      properties:
        url:
          type: string
          description: "JAMA makale URL'si (örn: https://jamanetwork.com/journals/jama/article-abstract/...)"
      required:
        - url
    outputSchema:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            title:
              type: string
            authors:
              type: array
            abstract:
              type: object
            population:
              type: string
            intervention:
              type: string
            findings:
              type: string
            settings:
              type: string
            primary_outcome:
              type: string
        error:
          type: string

  - name: create_abstract_visual
    description: "Makale verilerine göre abstract görsel oluşturur ve PPTX formatında döndürür"
    inputSchema:
      type: object
      properties:
        article_data:
          type: object
          description: "extract_jama_article tool'undan gelen makale verileri"
      required:
        - article_data
    outputSchema:
      type: object
      properties:
        success:
          type: boolean
        pptx_base64:
          type: string
          description: "Base64 encoded PPTX dosyası"
        filename:
          type: string
        message:
          type: string
        error:
          type: string

install:
  pip:
    - fastmcp>=0.9.0
    - selenium>=4.15.0
    - beautifulsoup4>=4.12.0
    - requests>=2.31.0
    - aiohttp>=3.9.0
    - typing-extensions>=4.8.0
    - webdriver-manager>=4.0.0
    - python-pptx>=0.6.21
    - Pillow>=10.0.0
    - matplotlib>=3.7.0
    - seaborn>=0.12.0
    - lxml>=4.9.0